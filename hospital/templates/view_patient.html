{% extends "navigationbar.html" %}
{% load static %}

{% block body %}

<div class="container mt-4">
    <h2 class="text-center">View Patient</h2>
    <br><br>

    <table class="table table-bordered table-hover" id="example">
        <thead class="thead-dark">
            <tr>
                <th>Patient ID</th>
                <th>Patient Name</th>
                <th>Gender</th>
                <th>Contact</th>
                <th>address</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody>
            {% for i in pat %}
            <tr>
                <td>{{ i.id }}</td>
                <td>{{ i.name }}</td>
                <td>{{ i.gender }}</td>
                <td>{{ i.contact}}</td>
                <td>{{ i.address }}</td>
                <td>
                    <a href="{% url 'delete_patient' i.id %}"
                       onclick="return confirm('Are you sure you want to delete this patient?')"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
