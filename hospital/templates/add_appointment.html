{% extends "navigationbar.html" %}

{% block body %}

<div class="container" style="margin-top:50px">
    <h2 class="text-center">Add Appointment</h2>
    <br>

    <form method="POST">
        {% csrf_token %}

        <!-- Doctor -->
        <div class="form-group">
            <label>Doctor Name</label>

            <select name="doctor" class="form-control" required>
                <option value="">Select Doctor</option>

                {% for i in doctor %}
                <option value="{{ i.id }}">
                    {{ i.name }} [{{ i.id }}]
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Patient -->
        <div class="form-group">
            <label>Patient Name</label>

            <select name="patient" class="form-control" required>
                <option value="">Select Patient</option>

                {% for i in patient %}
                <option value="{{ i.id }}">
                    {{ i.name }} [{{ i.id }}]
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Date -->
        <div class="form-group">
            <label>Date</label>

            <input type="date"
                   class="form-control"
                   name="date"
                   required>
        </div>

        <!-- Time -->
        <div class="form-group">
            <label>Time</label>

            <input type="time"
                   class="form-control"
                   name="time"
                   required>
        </div>

        <br>

        <input type="submit"
               value="Submit"
               class="btn btn-primary form-control">
    </form>
</div>

{% if error == "no" %}
<script>
    alert('Record Saved Successfully');
    window.location = "{% url 'view_appointment' %}";
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert('Something went wrong, try again');
</script>
{% endif %}

{% endblock %}
